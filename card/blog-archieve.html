<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Resources & Insights</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --purple: #7f56d9;
        --purple-light: #9d7ce3;
        --purple-soft: #c4b5fd;
        --purple-bg: #f4ebff;
        --text: #1d1d1f;
        --muted: #667085;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: Inter, sans-serif;
        background: linear-gradient(
          135deg,
          #f8f4ff 0%,
          #e8d5ff 50%,
          #ddd6fe 100%
        );
        color: var(--text);
        overflow-x: hidden;
        min-height: 100vh;
      }

      /* ===== GEOMETRIC BACKGROUND ===== */
      .bg-shapes {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
      }

      .bg-shapes::before,
      .bg-shapes::after {
        content: "";
        position: absolute;
        background: linear-gradient(
          135deg,
          rgba(139, 92, 246, 0.15),
          rgba(196, 181, 253, 0.1)
        );
        border-radius: 50px;
      }

      .bg-shapes::before {
        width: 400px;
        height: 200px;
        top: -50px;
        right: -100px;
        transform: rotate(-15deg);
      }

      .bg-shapes::after {
        width: 300px;
        height: 150px;
        bottom: 100px;
        left: -50px;
        transform: rotate(25deg);
      }

      .shape-1 {
        position: absolute;
        width: 600px;
        height: 300px;
        background: linear-gradient(
          135deg,
          rgba(139, 92, 246, 0.08),
          rgba(196, 181, 253, 0.05)
        );
        border-radius: 60px;
        top: 20%;
        right: -200px;
        transform: rotate(-20deg);
      }

      .shape-2 {
        position: absolute;
        width: 350px;
        height: 180px;
        background: linear-gradient(
          135deg,
          rgba(196, 181, 253, 0.12),
          rgba(139, 92, 246, 0.06)
        );
        border-radius: 40px;
        bottom: 200px;
        left: -100px;
        transform: rotate(35deg);
      }

      /* ===== HERO ===== */
      .hero {
        text-align: center;
        padding: 120px 20px 60px;
        position: relative;
        z-index: 2;
      }
      .hero span {
        background: var(--purple-bg);
        color: var(--purple);
        padding: 8px 16px;
        border-radius: 25px;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.5px;
      }
      .hero h1 {
        font-size: 48px;
        margin: 20px 0;
        font-weight: 700;
        background: linear-gradient(135deg, var(--text) 0%, var(--purple) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .hero p {
        max-width: 520px;
        margin: auto;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.6;
      }
      .hero input {
        margin-top: 30px;
        padding: 14px 20px;
        width: 300px;
        border-radius: 12px;
        border: 1px solid #e5e7eb;
        font-size: 16px;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);
        transition: all 0.3s ease;
      }
      .hero input:focus {
        outline: none;
        border-color: var(--purple);
        box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
      }

      /* ===== BLOG ===== */
      .section {
        position: relative;
        padding: 40px 20px 120px;
      }
      .container {
        max-width: 1200px;
        margin: auto;
        position: relative;
        z-index: 2;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 32px;
      }

      /* ===== CARD ===== */
      .card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(20px);
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(139, 92, 246, 0.08),
          0 8px 32px rgba(0, 0, 0, 0.04);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }
      .card:hover {
        transform: translateY(-8px) scale(1.02);
        box-shadow: 0 32px 80px rgba(139, 92, 246, 0.15),
          0 12px 48px rgba(0, 0, 0, 0.08);
      }
      .card img {
        width: 100%;
        height: 220px;
        object-fit: cover;
        transition: transform 0.4s ease;
      }
      .card:hover img {
        transform: scale(1.05);
      }
      .card .content {
        padding: 24px;
      }
      .cat {
        font-size: 13px;
        color: var(--purple);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.8px;
      }
      .card h3 {
        margin: 12px 0 10px;
        font-size: 22px;
        font-weight: 600;
        line-height: 1.3;
        color: var(--text);
      }
      .card p {
        font-size: 15px;
        color: var(--muted);
        line-height: 1.6;
      }
      .meta {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-top: 20px;
        padding-top: 16px;
        border-top: 1px solid rgba(0, 0, 0, 0.05);
      }
      .meta img {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 2px solid rgba(139, 92, 246, 0.1);
      }
      .meta span {
        font-size: 13px;
        color: var(--muted);
      }

      /* ===== LOAD MORE ===== */
      .load {
        text-align: center;
        margin-top: 60px;
      }
      .load button {
        background: linear-gradient(
          135deg,
          var(--purple-bg) 0%,
          rgba(196, 181, 253, 0.3) 100%
        );
        color: var(--purple);
        border: 2px solid rgba(139, 92, 246, 0.2);
        padding: 16px 32px;
        border-radius: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 14px;
        letter-spacing: 0.5px;
        backdrop-filter: blur(10px);
      }
      .load button:hover {
        background: linear-gradient(
          135deg,
          var(--purple) 0%,
          var(--purple-light) 100%
        );
        color: white;
        transform: translateY(-2px);
        box-shadow: 0 12px 32px rgba(139, 92, 246, 0.3);
      }
      .load button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* ===== RESPONSIVE ===== */
      @media (max-width: 768px) {
        .hero h1 {
          font-size: 36px;
        }
        .hero input {
          width: 280px;
        }
        .grid {
          grid-template-columns: 1fr;
          gap: 24px;
        }
      }
    </style>
  </head>

  <body>
    <!-- BACKGROUND SHAPES -->
    <div class="bg-shapes">
      <div class="shape-1"></div>
      <div class="shape-2"></div>
    </div>

    <!-- HERO -->
    <section class="hero">
      <span>Our blog</span>
      <h1>Resources and insights</h1>
      <p>The latest industry news, interviews, technologies, and resources.</p>
      <input type="text" placeholder="Search" />
    </section>

    <!-- BLOG -->
    <section class="section">
      <div class="container">
        <div class="grid" id="blogGrid"></div>

        <div class="load">
          <button id="loadMore">↓ Load more</button>
        </div>
      </div>
    </section>

    <script>
      /* ===== LOAD MORE (AJAX STYLE) ===== */
      const posts = [
        "UX review presentations",
        "Migrating to Linear 101",
        "Building your API Stack",
        "Leadership lessons",
        "What is Wireframing?",
        "PM mental models",
        "Design system evolution",
        "User research methods",
        "Product strategy guide",
      ];
      let i = 0;
      const grid = document.getElementById("blogGrid");
      const loadMore = document.getElementById("loadMore");

      function loadPosts(n = 3) {
        for (let c = 0; c < n; c++) {
          if (i >= posts.length) {
            loadMore.disabled = true;
            loadMore.textContent = "All posts loaded";
            return;
          }

          const card = document.createElement("article");
          card.className = "card";
          card.style.opacity = "0";
          card.style.transform = "translateY(20px)";

          card.innerHTML = `
            <img src="https://picsum.photos/600/440?random=${
              i + 1
            }" alt="Blog post image">
            <div class="content">
              <span class="cat">Design</span>
              <h3>${posts[i]}</h3>
              <p>How do you create compelling presentations that wow your colleagues and impress your managers?</p>
              <div class="meta">
                <img src="https://i.pravatar.cc/44?img=${
                  (i % 20) + 1
                }" alt="Author avatar">
                <div>
                  <strong>Olivia Rhye</strong><br>
                  <span>20 Jan 2024</span>
                </div>
              </div>
            </div>
          `;

          grid.appendChild(card);

          // Animate in
          setTimeout(() => {
            card.style.transition = "all 0.6s cubic-bezier(0.4, 0, 0.2, 1)";
            card.style.opacity = "1";
            card.style.transform = "translateY(0)";
          }, c * 100);

          i++;
        }
      }

      loadMore.onclick = () => loadPosts();

      // Initial load
      loadPosts();

      /* ===== SMOOTH ANIMATIONS ===== */
      window.addEventListener("load", () => {
        document.querySelectorAll(".card").forEach((card, index) => {
          card.style.animationDelay = `${index * 0.1}s`;
        });
      });
    </script>
  </body>
</html>
